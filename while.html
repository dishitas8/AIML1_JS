<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var count=0;
        document.write("Loop started"+"<br>");
        while(count<10) {
            document.write("Current count:"+count+"<br>");
            count++;
        }
    </script>
</body>
</html>
