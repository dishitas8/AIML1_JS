<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Create Object from JSON String</h2>
    <p id="demo"></p>
    <script>
        var text= '{"employees":['+
        '{"firstName":"John", "lastName":"Doe"},'+
        '{"firstName":"Anna", "lastName":"Smith"},'+
        '{"firstName":"Peter", "lastName":"Jones"}'+
        ']}';
        var obj=JSON.parse(text);
        document.getElementById("demo").innerHTML=obj.employees[0].firstName+" "+obj.employees[0].lastName;
        var numbers=[1,2,3,4];
        var result=numbers.map(n=>n*2);
        console.log(result);

    </script>
    <p>whenever the function is passes as argument it is called higher order function</p>
    <p>map filter reduce method are important</p>
</body>
</html>
